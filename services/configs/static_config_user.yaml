components_manager:
    task_processors:
        main-task-processor:
            worker_threads: 4
        fs-task-processor:
            worker_threads: 1

    default_task_processor: main-task-processor

    components:
        postgres-taxi-db:
            dbconnection#env: POSTGRES_DSN
            blocking_task_processor: fs-task-processor
            dns_resolver: async
            sync-start: true
            connlimit_mode: auto
        server:
            listener:
                port: 8081
                task_processor: main-task-processor
        logging:
            loggers:
                default:
                    file_path: '@stderr'
                    level: debug
                    overflow_behavior: discard

        handler-create-user:
            path: /api/v1/users
            method: POST
            task_processor: main-task-processor

        handler-find-user:
            path: /api/v1/users
            method: GET
            task_processor: main-task-processor

        handler-search-users:
            path: /api/v1/users/search
            method: GET
            task_processor: main-task-processor

        handler-login:
            path: /api/v1/auth/login
            method: POST
            task_processor: main-task-processor
            jwt-secret: "your-jwt-secret-key-change-it-in-production"
            jwt-issuer: "taxi-service"
            token-expiration-hours: 24

        testsuite-support:

        http-client:
        http-client-core:
        http-client-middleware-pipeline:
        dns-client:

        tests-control:
            method: POST
            path: /tests/control
            task_processor: main-task-processor

        handler-ping:
            method: GET
            path: /ping
            task_processor: main-task-processor