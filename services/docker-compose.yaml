services:
  postgres:
    image: postgres:16-alpine
    container_name: taxi-postgres
    environment:
      POSTGRES_DB: taxi_db
      POSTGRES_USER: taxi_user
      POSTGRES_PASSWORD: taxi_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./data.sql:/docker-entrypoint-initdb.d/02-data.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taxi_user -d taxi_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - taxi-network
    restart: unless-stopped

  mongodb:
    image: mongo:7-jammy
    container_name: taxi-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: taxi_mongo
      MONGO_INITDB_ROOT_PASSWORD: taxi_mongo_password
      MONGO_INITDB_DATABASE: taxi_db
    volumes:
      - mongo_data:/data/db
      - ./mongo-init:/docker-entrypoint-initdb.d:ro
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--username", "taxi_mongo", "--password", "taxi_mongo_password", "--authenticationDatabase", "admin", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - taxi-network
    restart: unless-stopped

  user-service:
    platform: linux/amd64
    build:
      context: .
      dockerfile: Dockerfile
    container_name: taxi-user-service
    command: ["/app/taxi-service-user", "--config", "/app/configs/static_config_user.yaml"]
    ports:
      - "8081:8081"
    volumes:
      - ./configs/static_config_user.yaml:/app/configs/static_config_user.yaml:ro
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    environment:
      POSTGRES_DSN: postgresql://taxi_user:taxi_password@postgres:5432/taxi_db
      MONGO_URI: mongodb://taxi_mongo:taxi_mongo_password@mongodb:27017/taxi_db?authSource=admin
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8081/ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - taxi-network
    restart: unless-stopped

  driver-service:
    platform: linux/amd64
    build:
      context: .
      dockerfile: Dockerfile
    container_name: taxi-driver-service
    command: ["/app/taxi-service-driver", "--config", "/app/configs/static_config_driver.yaml"]
    ports:
      - "8082:8082"
    volumes:
      - ./configs/static_config_driver.yaml:/app/configs/static_config_driver.yaml:ro
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_DSN: postgresql://taxi_user:taxi_password@postgres:5432/taxi_db
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8082/ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - taxi-network
    restart: unless-stopped

  ride-service:
    platform: linux/amd64
    build:
      context: .
      dockerfile: Dockerfile
    container_name: taxi-ride-service
    command: ["/app/taxi-service-ride", "--config", "/app/configs/static_config_ride.yaml"]
    ports:
      - "8083:8083"
    volumes:
      - ./configs/static_config_ride.yaml:/app/configs/static_config_ride.yaml:ro
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_DSN: postgresql://taxi_user:taxi_password@postgres:5432/taxi_db
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8083/ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - taxi-network
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: taxi-nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./swagger:/usr/share/nginx/html/swagger:ro
      - ./openapi.yaml:/usr/share/nginx/html/openapi.yaml:ro
    depends_on:
      - user-service
      - driver-service
      - ride-service
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - taxi-network
    restart: unless-stopped

networks:
  taxi-network:
    driver: bridge

volumes:
  postgres_data:
  mongo_data:
