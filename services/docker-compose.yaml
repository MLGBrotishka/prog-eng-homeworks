services:
  user-service:
    platform: linux/amd64
    build:
      context: .
      dockerfile: Dockerfile
    container_name: taxi-user-service
    command: ["/app/taxi-service-user", "--config", "/app/configs/static_config_user.yaml"]
    ports:
      - "8081:8081"
    volumes:
      - ./data:/app/data
      - ./configs/static_config_user.yaml:/app/configs/static_config_user.yaml:ro
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8081/ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - taxi-network
    restart: unless-stopped

  driver-service:
    platform: linux/amd64
    build:
      context: .
      dockerfile: Dockerfile
    container_name: taxi-driver-service
    command: ["/app/taxi-service-driver", "--config", "/app/configs/static_config_driver.yaml"]
    ports:
      - "8082:8082"
    volumes:
      - ./data:/app/data
      - ./configs/static_config_driver.yaml:/app/configs/static_config_driver.yaml:ro
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8082/ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - taxi-network
    restart: unless-stopped

  ride-service:
    platform: linux/amd64
    build:
      context: .
      dockerfile: Dockerfile
    container_name: taxi-ride-service
    command: ["/app/taxi-service-ride", "--config", "/app/configs/static_config_ride.yaml"]
    ports:
      - "8083:8083"
    volumes:
      - ./data:/app/data
      - ./configs/static_config_ride.yaml:/app/configs/static_config_ride.yaml:ro
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8083/ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - taxi-network
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: taxi-nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./swagger:/usr/share/nginx/html/swagger:ro
      - ./openapi.yaml:/usr/share/nginx/html/openapi.yaml:ro
    depends_on:
      - user-service
      - driver-service
      - ride-service
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - taxi-network
    restart: unless-stopped

networks:
  taxi-network:
    driver: bridge

volumes:
  postgres_data:
