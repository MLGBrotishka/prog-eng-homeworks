events {
    worker_connections 1024;
}

http {
    upstream user_service {
        server user-service:8081;
    }

    upstream driver_service {
        server driver-service:8082;
    }

    upstream ride_service {
        server ride-service:8083;
    }

    server {
        listen 80;
        server_name localhost;

        # Health check endpoint
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # Ping endpoint for compatibility with test script
        location /ping {
            access_log off;
            return 200 "pong\n";
            add_header Content-Type text/plain;
        }

        # User Service endpoints
        location /api/v1/users {
            proxy_pass http://user_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization $http_authorization;
            proxy_hide_header Content-Type;
            add_header Content-Type application/json always;
        }

        location /api/v1/auth {
            proxy_pass http://user_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization $http_authorization;
            proxy_hide_header Content-Type;
            add_header Content-Type application/json always;
        }

        # Driver Service endpoints
        location /api/v1/drivers {
            proxy_pass http://driver_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization $http_authorization;
            proxy_hide_header Content-Type;
            add_header Content-Type application/json always;
        }

        # Ride Service endpoints
        location /api/v1/rides {
            proxy_pass http://ride_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization $http_authorization;
            proxy_hide_header Content-Type;
            add_header Content-Type application/json always;
        }

        location ~ ^/api/v1/users/[^/]+/rides$ {
            proxy_pass http://ride_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization $http_authorization;
            proxy_hide_header Content-Type;
            add_header Content-Type application/json always;
        }

        # Swagger UI - serve static files
        location /swagger/ {
            alias /usr/share/nginx/html/swagger/;
            index index.html;
            try_files $uri $uri/ /swagger/index.html;
        }

        # OpenAPI YAML specification
        location /openapi.yaml {
            alias /usr/share/nginx/html/openapi.yaml;
            default_type application/yaml;
        }
    }
}
